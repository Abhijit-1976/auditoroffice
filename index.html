<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auditor Office — Strategic Tax Advisory & Corporate Compliance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #f9f8f6; color: #1a1a2e; -webkit-font-smoothing: antialiased; }
    h1,h2,h3,h4,h5 { font-family: 'Plus Jakarta Sans', sans-serif; }
    a { text-decoration: none; color: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#c8860a",
      "ctaText": "Schedule a Strategic Consultation"
    }/*EDITMODE-END*/;

    const { useState, useEffect } = React;

    // ─── DATA ───────────────────────────────────────────────────────────────
    const pillars = [
      {
        tag: "01",
        title: "Strategic Tax Advisory",
        lead: "Forward-looking corporate tax strategy — not year-end form-filling.",
        desc: "We design tax strategies that optimise your liabilities, keep you aligned with evolving law, and protect your bottom line before issues ever arise.",
        items: ["Corporate Tax Planning", "GST Strategy & Advisory", "Income Tax Optimisation", "Transaction Structuring"],
      },
      {
        tag: "02",
        title: "Corporate Governance & Compliance",
        lead: "Your outsourced Chief Compliance Officer.",
        desc: "From company law to industry-specific regulation, we keep your business audit-ready, credit-worthy and fully compliant — every filing, every deadline, handled.",
        items: ["ROC & Secretarial Compliance", "Board & Statutory Governance", "Regulatory Filings", "Audit Readiness"],
      },
      {
        tag: "03",
        title: "Scaling & Growth Compliance",
        lead: "Compliance frameworks built for expansion.",
        desc: "As you grow, your liabilities grow. We manage the complex compliance behind raising capital, cross-border trade and corporate restructuring.",
        items: ["FDI & Cross-Border Compliance", "Capital Raising Support", "Corporate Restructuring", "Due Diligence"],
      },
    ];

    const shift = [
      { trad: "Reactive — they look at your numbers at year-end, just to file a return.", ours: "Proactive — we monitor changing laws to optimise your strategy ahead of time." },
      { trad: "Transactional — they charge per form or per registration.", ours: "Partnership-driven — we manage your entire compliance ecosystem so you can scale." },
      { trad: "Risk-focused — they focus only on avoiding penalties.", ours: "Growth-focused — we turn compliance into your advantage with investors and banks." },
    ];

    const stats = [
      { number: "500+", label: "Businesses Advised" },
      { number: "25+", label: "Years of Expertise" },
      { number: "98%", label: "Client Retention" },
      { number: "15+", label: "Expert Professionals" },
    ];

    const testimonials = [
      { name: "Dilip Anchekar", company: "Skanda Navia Logistics Pvt Ltd", text: "They function as a true compliance partner, not a filing service. We stay audit-ready year round and finally have peace of mind." },
      { name: "V.Nair", company: "Skystar Logistics Pvt Ltd", text: "FDI compliance and cross-border structuring with overseas directors — handled strategically and flawlessly. Genuinely advisory." },
      { name: "A.Bhat", company: "Istream Technologies Pvt Ltd", text: "Proactive, transparent and invested in our growth. Their compliance work is exactly what our investors wanted to see." },
    ];

    // ─── NAV ────────────────────────────────────────────────────────────────
    function Nav({ accent }) {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', h);
        return () => window.removeEventListener('scroll', h);
      }, []);
      return (
        <nav style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
          background: scrolled ? 'rgba(13,27,42,0.92)' : 'transparent',
          backdropFilter: scrolled ? 'blur(12px)' : 'none',
          borderBottom: scrolled ? '1px solid rgba(255,255,255,0.08)' : '1px solid transparent',
          transition: 'all 0.3s ease',
        }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 32px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 72 }}>
            <a href="#top" style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 2.5, background: accent, borderRadius: 6, padding: 6 }}>
                <span style={{ width: 11, height: 11, borderRadius: 2, background: '#fff' }}></span>
                <span style={{ width: 11, height: 11, borderRadius: 2, background: '#fff', opacity: 0.55 }}></span>
                <span style={{ width: 11, height: 11, borderRadius: 2, background: '#fff', opacity: 0.55 }}></span>
                <span style={{ width: 11, height: 11, borderRadius: 2, background: '#fff' }}></span>
              </div>
              <span style={{ fontFamily: 'Plus Jakarta Sans', fontWeight: 800, fontSize: 18, color: '#f9f8f6', letterSpacing: '-0.3px' }}>
                Auditor<span style={{ color: accent }}>Office</span>
              </span>
            </a>
            <div style={{ display: 'flex', gap: 32, alignItems: 'center' }}>
              {[['The Difference','#difference'],['Our Pillars','#pillars'],['Philosophy','#philosophy'],['Contact','#contact']].map(([label, href]) => (
                <a key={href} href={href}
                  style={{ fontSize: 14, fontWeight: 500, color: '#f9f8f6', opacity: 0.7, transition: 'opacity 0.2s' }}
                  onMouseEnter={e => e.target.style.opacity = 1}
                  onMouseLeave={e => e.target.style.opacity = 0.7}
                >{label}</a>
              ))}
              <a href="#contact" style={{ background: accent, color: '#fff', padding: '10px 22px', borderRadius: 8, fontSize: 14, fontWeight: 600, transition: 'opacity 0.2s' }}
                onMouseEnter={e => e.currentTarget.style.opacity = 0.88}
                onMouseLeave={e => e.currentTarget.style.opacity = 1}
              >Book a Consultation</a>
            </div>
          </div>
        </nav>
      );
    }

    // ─── HERO ───────────────────────────────────────────────────────────────
    function Hero({ accent, ctaText }) {
      return (
        <section id="top" style={{ minHeight: '100vh', background: '#0d1b2a', position: 'relative', overflow: 'hidden', display: 'flex', alignItems: 'center' }}>
          <div style={{ position: 'absolute', inset: 0, opacity: 0.045, backgroundImage: 'repeating-linear-gradient(0deg, transparent 0 47px, rgba(255,255,255,.6) 47px 48px), repeating-linear-gradient(90deg, transparent 0 47px, rgba(255,255,255,.6) 47px 48px)' }}></div>
          <div style={{ position: 'absolute', top: '-20%', right: '-10%', width: 600, height: 600, borderRadius: '50%', background: `radial-gradient(circle, ${accent}22 0%, transparent 65%)` }}></div>
          <div style={{ position: 'relative', maxWidth: 1200, margin: '0 auto', padding: '140px 32px 90px', width: '100%' }}>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 9, background: `${accent}18`, border: `1px solid ${accent}40`, borderRadius: 40, padding: '7px 18px', marginBottom: 34 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: accent }}></span>
              <span style={{ fontSize: 12, color: accent, fontWeight: 600, letterSpacing: '1px' }}>STRATEGIC TAX ADVISORY &amp; CORPORATE COMPLIANCE</span>
            </div>
            <h1 style={{ fontSize: 'clamp(40px, 6vw, 76px)', fontWeight: 800, color: '#f9f8f6', lineHeight: 1.04, letterSpacing: '-2px', maxWidth: 900 }}>
              Compliance is the Foundation.<br /><span style={{ color: accent }}>Growth is the Objective.</span>
            </h1>
            <p style={{ fontSize: 19, color: 'rgba(249,248,246,0.62)', lineHeight: 1.7, marginTop: 28, maxWidth: 620 }}>
              We don't just file your past — we protect your future. AuditorOffice provides comprehensive tax advisory and bulletproof corporate compliance, giving you the freedom to scale with absolute peace of mind.
            </p>
            <div style={{ display: 'flex', gap: 16, marginTop: 44, flexWrap: 'wrap' }}>
              <a href="#contact" style={{ background: accent, color: '#fff', padding: '17px 34px', borderRadius: 10, fontWeight: 700, fontSize: 16, fontFamily: 'Plus Jakarta Sans', transition: 'opacity 0.2s' }}
                onMouseEnter={e => e.currentTarget.style.opacity = 0.88}
                onMouseLeave={e => e.currentTarget.style.opacity = 1}
              >{ctaText}</a>
              <a href="#pillars" style={{ background: 'rgba(255,255,255,0.06)', color: '#f9f8f6', padding: '17px 34px', borderRadius: 10, fontWeight: 600, fontSize: 16, border: '1px solid rgba(255,255,255,0.14)', fontFamily: 'Plus Jakarta Sans' }}>Explore Our Compliance Framework</a>
            </div>
            <div style={{ marginTop: 72, display: 'grid', gridTemplateColumns: 'repeat(4, auto)', gap: 56, borderTop: '1px solid rgba(255,255,255,0.08)', paddingTop: 36 }}>
              {stats.map((s, i) => (
                <div key={i}>
                  <div style={{ fontSize: 34, fontWeight: 800, color: accent, fontFamily: 'Plus Jakarta Sans', lineHeight: 1 }}>{s.number}</div>
                  <div style={{ fontSize: 13, color: 'rgba(249,248,246,0.5)', marginTop: 8, fontWeight: 500 }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ─── THE SHIFT (comparison) ─────────────────────────────────────────────
    function Difference({ accent }) {
      return (
        <section id="difference" style={{ padding: '110px 32px', background: '#f9f8f6' }}>
          <div style={{ maxWidth: 1100, margin: '0 auto' }}>
            <div style={{ textAlign: 'center', marginBottom: 64, maxWidth: 640, marginLeft: 'auto', marginRight: 'auto' }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: accent, letterSpacing: '1.5px', marginBottom: 14 }}>THE SHIFT</div>
              <h2 style={{ fontSize: 'clamp(28px, 4vw, 46px)', fontWeight: 800, color: '#0d1b2a', letterSpacing: '-0.8px', lineHeight: 1.15 }}>
                Why Businesses Choose a Partner, Not a Filer
              </h2>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0, borderRadius: 18, overflow: 'hidden', border: '1px solid rgba(13,27,42,0.1)' }}>
              <div style={{ padding: '24px 32px', background: '#efece7', borderRight: '1px solid rgba(13,27,42,0.08)' }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: '#6b7785', fontFamily: 'Plus Jakarta Sans', letterSpacing: '0.3px' }}>Traditional CA Firms</span>
              </div>
              <div style={{ padding: '24px 32px', background: '#0d1b2a' }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: accent, fontFamily: 'Plus Jakarta Sans', letterSpacing: '0.3px' }}>The AuditorOffice Approach</span>
              </div>
              {shift.map((row, i) => (
                <React.Fragment key={i}>
                  <div style={{ padding: '28px 32px', background: '#fff', borderRight: '1px solid rgba(13,27,42,0.08)', borderTop: '1px solid rgba(13,27,42,0.06)', display: 'flex', gap: 14, alignItems: 'flex-start' }}>
                    <span style={{ color: '#c0c5cc', fontSize: 18, lineHeight: 1.3, flexShrink: 0 }}>✕</span>
                    <span style={{ fontSize: 15, color: '#6b7785', lineHeight: 1.6 }}>{row.trad}</span>
                  </div>
                  <div style={{ padding: '28px 32px', background: 'rgba(13,27,42,0.97)', borderTop: '1px solid rgba(255,255,255,0.06)', display: 'flex', gap: 14, alignItems: 'flex-start' }}>
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{ flexShrink: 0, marginTop: 2 }}><path d="M3 9l4 4 8-9" stroke={accent} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span style={{ fontSize: 15, color: 'rgba(249,248,246,0.88)', lineHeight: 1.6 }}>{row.ours}</span>
                  </div>
                </React.Fragment>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ─── PILLARS ────────────────────────────────────────────────────────────
    function Pillars({ accent }) {
      return (
        <section id="pillars" style={{ padding: '110px 32px', background: '#0d1b2a' }}>
          <div style={{ maxWidth: 1200, margin: '0 auto' }}>
            <div style={{ marginBottom: 64, display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', flexWrap: 'wrap', gap: 24 }}>
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: accent, letterSpacing: '1.5px', marginBottom: 14 }}>OUR CORE PILLARS</div>
                <h2 style={{ fontSize: 'clamp(28px, 4vw, 46px)', fontWeight: 800, color: '#f9f8f6', letterSpacing: '-0.8px', lineHeight: 1.15 }}>
                  Premium Solutions,<br />Not Standalone Forms
                </h2>
              </div>
              <p style={{ maxWidth: 360, fontSize: 15, color: 'rgba(249,248,246,0.5)', lineHeight: 1.7 }}>
                Every registration and filing lives inside a larger strategy — engineered to keep you protected and ready to scale.
              </p>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 24 }}>
              {pillars.map((p, i) => (
                <div key={i} style={{
                  background: 'rgba(255,255,255,0.035)', border: '1px solid rgba(255,255,255,0.08)',
                  borderRadius: 18, padding: '40px 32px', display: 'flex', flexDirection: 'column',
                  transition: 'background 0.2s, transform 0.2s',
                }}
                  onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.06)'; e.currentTarget.style.transform = 'translateY(-3px)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.035)'; e.currentTarget.style.transform = 'none'; }}
                >
                  <div style={{ fontSize: 13, fontWeight: 800, color: accent, fontFamily: 'Plus Jakarta Sans', letterSpacing: '1px', marginBottom: 24 }}>{p.tag}</div>
                  <h3 style={{ fontSize: 21, fontWeight: 700, color: '#f9f8f6', fontFamily: 'Plus Jakarta Sans', lineHeight: 1.2, marginBottom: 14 }}>{p.title}</h3>
                  <p style={{ fontSize: 14.5, color: accent, fontWeight: 500, lineHeight: 1.5, marginBottom: 14 }}>{p.lead}</p>
                  <p style={{ fontSize: 14.5, color: 'rgba(249,248,246,0.55)', lineHeight: 1.7, marginBottom: 28 }}>{p.desc}</p>
                  <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 11, marginTop: 'auto', paddingTop: 24, borderTop: '1px solid rgba(255,255,255,0.07)' }}>
                    {p.items.map((it, j) => (
                      <li key={j} style={{ display: 'flex', alignItems: 'center', gap: 11, fontSize: 14, color: 'rgba(249,248,246,0.78)' }}>
                        <span style={{ width: 5, height: 5, borderRadius: '50%', background: accent, flexShrink: 0 }}></span>
                        {it}
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ─── PHILOSOPHY / MESSAGE BANNER ────────────────────────────────────────
    function Philosophy({ accent }) {
      return (
        <section id="philosophy" style={{ padding: '120px 32px', background: '#f9f8f6' }}>
          <div style={{ maxWidth: 980, margin: '0 auto', textAlign: 'center' }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: accent, letterSpacing: '1.5px', marginBottom: 28 }}>OUR PHILOSOPHY</div>
            <h2 style={{ fontSize: 'clamp(28px, 4.5vw, 52px)', fontWeight: 800, color: '#0d1b2a', letterSpacing: '-1px', lineHeight: 1.15, marginBottom: 36 }}>
              "When your compliance is flawless,<br />your business becomes <span style={{ color: accent }}>unstoppable</span>."
            </h2>
            <p style={{ fontSize: 18, color: '#6b7785', lineHeight: 1.8, maxWidth: 720, margin: '0 auto' }}>
              Many owners see compliance as a burden — a box to check. We see it as a launchpad. Clean books and perfect legal standing are exactly what banks, investors and large clients look for before doing business with you. We build that trust on your behalf.
            </p>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24, marginTop: 64, textAlign: 'left' }}>
              {[
                { t: "Investor-Ready", d: "Compliance that withstands the scrutiny of due diligence and funding rounds." },
                { t: "Bank-Credible", d: "Clean records that unlock credit lines and stronger lending terms." },
                { t: "Always Audit-Ready", d: "No year-end scramble — your books are continuously prepared." },
              ].map((c, i) => (
                <div key={i} style={{ background: '#fff', borderRadius: 14, padding: '28px 26px', border: '1px solid rgba(13,27,42,0.07)' }}>
                  <div style={{ width: 34, height: 34, borderRadius: 9, background: `${accent}16`, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 16 }}>
                    <span style={{ width: 11, height: 11, borderRadius: 2, background: accent }}></span>
                  </div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: '#0d1b2a', fontFamily: 'Plus Jakarta Sans', marginBottom: 9 }}>{c.t}</div>
                  <div style={{ fontSize: 14, color: '#6b7785', lineHeight: 1.65 }}>{c.d}</div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ─── TESTIMONIALS ───────────────────────────────────────────────────────
    function Testimonials({ accent }) {
      return (
        <section style={{ padding: '110px 32px', background: '#fff' }}>
          <div style={{ maxWidth: 1200, margin: '0 auto' }}>
            <div style={{ marginBottom: 64 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: accent, letterSpacing: '1.5px', marginBottom: 14 }}>CLIENT PARTNERSHIPS</div>
              <h2 style={{ fontSize: 'clamp(28px, 4vw, 46px)', fontWeight: 800, color: '#0d1b2a', letterSpacing: '-0.8px' }}>
                Trusted by Founders &amp; Boards
              </h2>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 24 }}>
              {testimonials.map((t, i) => (
                <div key={i} style={{ background: '#f9f8f6', borderRadius: 16, padding: '36px 32px', border: '1px solid rgba(13,27,42,0.06)' }}>
                  <div style={{ display: 'flex', gap: 3, marginBottom: 20 }}>
                    {[...Array(5)].map((_, j) => (
                      <svg key={j} width="14" height="14" viewBox="0 0 14 14" fill={accent}><polygon points="7,1 9,5 13,5.5 10,8.5 10.8,13 7,11 3.2,13 4,8.5 1,5.5 5,5"/></svg>
                    ))}
                  </div>
                  <p style={{ fontSize: 15, color: '#4a5568', lineHeight: 1.75, marginBottom: 28 }}>"{t.text}"</p>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                    <div style={{ width: 42, height: 42, borderRadius: '50%', background: `${accent}1e`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 16, color: accent, fontFamily: 'Plus Jakarta Sans' }}>{t.name[0]}</div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14, color: '#0d1b2a', fontFamily: 'Plus Jakarta Sans' }}>{t.name}</div>
                      <div style={{ fontSize: 12, color: '#9aafb7', marginTop: 2 }}>{t.company}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ─── CONTACT / CTA ──────────────────────────────────────────────────────
    function Contact({ accent, ctaText }) {
      const [form, setForm] = useState({ name: '', email: '', phone: '', service: '' });
      const [submitted, setSubmitted] = useState(false);
      return (
        <section id="contact" style={{ padding: '110px 32px', background: '#0d1b2a' }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'start' }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: accent, letterSpacing: '1.5px', marginBottom: 16 }}>BOOK A COMPLIANCE AUDIT</div>
              <h2 style={{ fontSize: 'clamp(28px, 3.6vw, 46px)', fontWeight: 800, color: '#f9f8f6', letterSpacing: '-0.8px', lineHeight: 1.15, marginBottom: 22 }}>
                Ready to lift the burden of compliance off your shoulders?
              </h2>
              <p style={{ fontSize: 17, color: 'rgba(249,248,246,0.55)', lineHeight: 1.8, marginBottom: 44 }}>
                Let's talk about how we can protect your business and accelerate your growth. Share your details and a senior advisor will reach out personally.
              </p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 26 }}>
                {[
                  { icon: "📍", label: "Office", val: "614, Nirmal Corporate Center, LBS Road, Mulund West, Mumbai 400080" },
                  { icon: "✉️", label: "Email", val: "abhijit@auditoroffice.com" },
                  { icon: "📞", label: "Phone", val: "+91 98205 99996" },
                ].map((c, i) => (
                  <div key={i} style={{ display: 'flex', gap: 16, alignItems: 'flex-start' }}>
                    <div style={{ width: 40, height: 40, borderRadius: 10, background: `${accent}18`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, flexShrink: 0 }}>{c.icon}</div>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: 'rgba(249,248,246,0.4)', letterSpacing: '0.5px', marginBottom: 4 }}>{c.label}</div>
                      <div style={{ fontSize: 14, color: 'rgba(249,248,246,0.8)', lineHeight: 1.6 }}>{c.val}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 20, padding: '40px 36px' }}>
              {submitted ? (
                <div style={{ textAlign: 'center', padding: '40px 0' }}>
                  <div style={{ width: 56, height: 56, borderRadius: '50%', background: `${accent}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px' }}>
                    <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M5 13L10 18L21 8" stroke={accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                  <h3 style={{ fontSize: 22, fontWeight: 800, color: '#f9f8f6', marginBottom: 10, fontFamily: 'Plus Jakarta Sans' }}>Request received.</h3>
                  <p style={{ fontSize: 14, color: 'rgba(249,248,246,0.5)', lineHeight: 1.6 }}>A senior advisor will reach out to schedule your strategic consultation.</p>
                </div>
              ) : (
                <form onSubmit={e => { e.preventDefault(); setSubmitted(true); }} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <h3 style={{ fontSize: 18, fontWeight: 700, color: '#f9f8f6', marginBottom: 8, fontFamily: 'Plus Jakarta Sans' }}>Schedule Your Consultation</h3>
                  {[
                    { key: 'name', label: 'Full Name', type: 'text', ph: 'Your full name' },
                    { key: 'email', label: 'Work Email', type: 'email', ph: 'you@company.com' },
                    { key: 'phone', label: 'Mobile Number', type: 'tel', ph: '+91 98xxx xxxxx' },
                  ].map(f => (
                    <div key={f.key}>
                      <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'rgba(249,248,246,0.5)', marginBottom: 8 }}>{f.label}</label>
                      <input type={f.type} placeholder={f.ph} required value={form[f.key]} onChange={e => setForm(p => ({...p, [f.key]: e.target.value}))}
                        style={{ width: '100%', padding: '12px 14px', borderRadius: 8, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)', color: '#f9f8f6', fontSize: 14, outline: 'none' }} />
                    </div>
                  ))}
                  <div>
                    <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'rgba(249,248,246,0.5)', marginBottom: 8 }}>Area of Interest</label>
                    <select value={form.service} onChange={e => setForm(p => ({...p, service: e.target.value}))}
                      style={{ width: '100%', padding: '12px 14px', borderRadius: 8, border: '1px solid rgba(255,255,255,0.1)', background: '#1a2e42', color: form.service ? '#f9f8f6' : 'rgba(249,248,246,0.4)', fontSize: 14, outline: 'none' }}>
                      <option value="">Select an area...</option>
                      <option>Strategic Tax Advisory</option>
                      <option>Corporate Governance &amp; Compliance</option>
                      <option>Scaling &amp; Growth Compliance</option>
                      <option>Not sure — advise me</option>
                    </select>
                  </div>
                  <button type="submit" style={{ background: accent, color: '#fff', padding: '14px', borderRadius: 10, fontWeight: 700, fontSize: 15, border: 'none', cursor: 'pointer', fontFamily: 'Plus Jakarta Sans', marginTop: 4, transition: 'opacity 0.2s' }}
                    onMouseEnter={e => e.currentTarget.style.opacity = 0.88}
                    onMouseLeave={e => e.currentTarget.style.opacity = 1}
                  >{ctaText}</button>
                  <p style={{ fontSize: 11, color: 'rgba(249,248,246,0.3)', textAlign: 'center', lineHeight: 1.5 }}>Confidential. Your information is never shared with third parties.</p>
                </form>
              )}
            </div>
          </div>
        </section>
      );
    }

    // ─── FOOTER ─────────────────────────────────────────────────────────────
    function Footer({ accent }) {
      const cols = [
        { title: "Our Pillars", href: "#pillars", links: ["Strategic Tax Advisory", "Corporate Governance", "Scaling & Growth Compliance", "Audit Readiness"] },
        { title: "Firm", links: [{ label: "The Difference", href: "#difference" }, { label: "Our Philosophy", href: "#philosophy" }, { label: "Client Partnerships", href: "#contact" }, { label: "Contact", href: "#contact" }] },
      ];
      return (
        <footer style={{ background: '#080f1a', padding: '72px 32px 32px', borderTop: '1px solid rgba(255,255,255,0.06)' }}>
          <div style={{ maxWidth: 1200, margin: '0 auto' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: 56, marginBottom: 60 }}>
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 11, marginBottom: 20 }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 2.5, background: accent, borderRadius: 6, padding: 6 }}>
                    <span style={{ width: 11, height: 11, borderRadius: 2, background: '#fff' }}></span>
                    <span style={{ width: 11, height: 11, borderRadius: 2, background: '#fff', opacity: 0.55 }}></span>
                    <span style={{ width: 11, height: 11, borderRadius: 2, background: '#fff', opacity: 0.55 }}></span>
                    <span style={{ width: 11, height: 11, borderRadius: 2, background: '#fff' }}></span>
                  </div>
                  <span style={{ fontFamily: 'Plus Jakarta Sans', fontWeight: 800, fontSize: 18, color: '#f9f8f6' }}>Auditor<span style={{ color: accent }}>Office</span></span>
                </div>
                <p style={{ fontSize: 14, color: 'rgba(249,248,246,0.42)', lineHeight: 1.8, maxWidth: 320 }}>
                  Strategic tax advisory and corporate compliance partners — turning regulatory rigour into your competitive advantage.
                </p>
              </div>
              {cols.map((col, i) => (
                <div key={i}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: 'rgba(249,248,246,0.5)', letterSpacing: '1px', marginBottom: 18 }}>{col.title.toUpperCase()}</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 11 }}>
                    {col.links.map((l, j) => {
                      const label = typeof l === 'string' ? l : l.label;
                      const href = typeof l === 'string' ? col.href : l.href;
                      return (
                        <a key={j} href={href} style={{ fontSize: 13.5, color: 'rgba(249,248,246,0.45)', transition: 'color 0.2s' }}
                          onMouseEnter={e => e.target.style.color = '#f9f8f6'}
                          onMouseLeave={e => e.target.style.color = 'rgba(249,248,246,0.45)'}
                        >{label}</a>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ borderTop: '1px solid rgba(255,255,255,0.06)', paddingTop: 28, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 16 }}>
              <span style={{ fontSize: 13, color: 'rgba(249,248,246,0.3)' }}>© 2026 Auditor Office. All rights reserved.</span>
              <div style={{ display: 'flex', gap: 24 }}>
                {['Privacy Policy', 'Terms of Service', 'Disclaimer'].map(l => (
                  <a key={l} href="#" style={{ fontSize: 13, color: 'rgba(249,248,246,0.3)' }}>{l}</a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    }

    // ─── APP ────────────────────────────────────────────────────────────────
    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const accent = tweaks.accentColor;
      return (
        <>
          <Nav accent={accent} />
          <Hero accent={accent} ctaText={tweaks.ctaText} />
          <Difference accent={accent} />
          <Pillars accent={accent} />
          <Philosophy accent={accent} />
          <Testimonials accent={accent} />
          <Contact accent={accent} ctaText={tweaks.ctaText} />
          <Footer accent={accent} />

          <TweaksPanel>
            <TweakSection title="Brand">
              <TweakColor id="accentColor" label="Accent Color" />
              <TweakText id="ctaText" label="Primary CTA Text" />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
